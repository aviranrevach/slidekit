<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Present Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root {
  --bg:        #08090d;
  --surface-1: #0d0e12;
  --surface-2: #13141a;
  --surface-3: #1e1f28;
  --border:    rgba(255,255,255,0.06);
  --border-hi: rgba(255,255,255,0.10);
  --text-1:    #f2f2f5;
  --text-2:    #8a8a9a;
  --text-3:    #52535e;
  --text-4:    #3e3e4a;
  --accent:    #5e6ad2;
  --accent-hi: #7c85d4;
}

/* ── Reset + base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text-1); font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── Top bar ── */
#topbar {
  height: 42px; background: var(--surface-1); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 10px; flex-shrink: 0; z-index: 100;
}
#topbar .title { font-size: 12px; color: var(--text-3); font-weight: 500; flex: 1; }
#topbar button {
  background: transparent; border: 1px solid var(--border-hi); color: var(--text-2);
  border-radius: 5px; padding: 5px 12px; font-size: 11px; font-weight: 500; cursor: pointer;
  display: inline-flex; align-items: center; gap: 5px; height: 28px;
}
#topbar button:hover { border-color: var(--border-hi); color: var(--text-1); background: var(--surface-2); }
#topbar button.primary { background: var(--accent); border-color: var(--accent); color: white; }
#topbar button.primary:hover { background: var(--accent-hi); border-color: var(--accent-hi); }
#topbar select {
  background: var(--surface-2); border: 1px solid var(--border); color: var(--text-2);
  border-radius: 5px; padding: 4px 8px; font-size: 11px; cursor: pointer; height: 28px;
}

/* ── Body ── */
#body { flex: 1; display: flex; overflow: hidden; position: relative; }

/* ── Frame strip (floating left panel) ── */
#frame-panel {
  position: absolute; left: 12px;
  top: 50%; transform: translateY(-50%);
  max-height: calc(100% - 24px);
  width: 104px; background: rgba(8,9,13,0.96); border: 1px solid var(--border);
  border-radius: 10px; z-index: 50; display: flex; flex-direction: column;
  overflow: hidden; backdrop-filter: blur(8px);
}
#frame-panel-header {
  padding: 7px 10px; border-bottom: 1px solid var(--border);
  font-size: 9px; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.1em;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.fp-view-toggle { display: flex; gap: 2px; }
.fp-view-btn { background: none; border: none; color: var(--text-4); cursor: pointer; padding: 2px 4px; border-radius: 3px; display: inline-flex; align-items: center; }
.fp-view-btn.active { color: var(--accent); background: rgba(94,106,210,0.12); }
#frame-panel-toggle { cursor: pointer; color: var(--text-3); font-size: 12px; }
#frame-list { overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
/* List view */
#frame-list.list-view .frame-thumb { aspect-ratio: unset; height: 28px; display: flex; align-items: center; padding: 0 8px; gap: 6px; }
#frame-list.list-view .frame-thumb-num { position: static; font-size: 9px; color: var(--text-3); flex-shrink: 0; }
#frame-list.list-view .frame-thumb-label { font-size: 9px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.frame-thumb {
  aspect-ratio: 16/9; background: var(--surface-2); border: 1.5px solid var(--border);
  border-radius: 4px; cursor: pointer; overflow: hidden; position: relative;
  transition: border-color 0.15s; flex-shrink: 0;
}
.frame-thumb:hover { border-color: var(--accent); }
.frame-thumb.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(94,106,210,0.2); }
.frame-thumb-num { position: absolute; bottom: 2px; left: 4px; font-size: 7px; color: var(--text-3); }

/* ── Canvas ── */
#canvas {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column;
  align-items: center; padding: 16px 24px 32px 124px; gap: 0;
  background: var(--bg);
  background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 20px 20px;
}

/* ── Present root + frames ── */
.present-root { width: 100%; max-width: 860px; display: flex; flex-direction: column; gap: 0; }

.present-frame {
  width: 100%; position: relative; overflow: hidden; border-radius: 10px;
  border: 2px solid transparent; transition: border-color 0.15s; cursor: default;
  margin-bottom: 16px;
}
.present-frame:hover { border-color: rgba(94,106,210,0.25); }
.present-frame.frame-selected { border-color: var(--accent); }

/* ── Frame toolbar — overlays top of frame, no dead space ── */
.frame-wrapper { position: relative; margin-bottom: 16px; }
.frame-wrapper .present-frame { margin-bottom: 0; }

.frame-toolbar {
  position: absolute; top: 8px; left: 8px;
  display: flex; align-items: center; gap: 2px;
  background: rgba(13,14,18,0.92); backdrop-filter: blur(8px);
  border: 1px solid var(--border-hi); border-radius: 6px; padding: 3px;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none; z-index: 20;
}
.frame-wrapper:hover .frame-toolbar { opacity: 1; pointer-events: all; }

.ftb {
  background: transparent; border: none; color: var(--text-2);
  border-radius: 4px; width: 26px; height: 26px;
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  transition: background 0.1s, color 0.1s; position: relative; flex-shrink: 0;
}
.ftb:hover { background: rgba(255,255,255,0.06); color: var(--text-1); }
.ftb.danger { color: rgba(239,68,68,0.6); }
.ftb.danger:hover { background: rgba(239,68,68,0.1); color: #ef4444; }
.ftb.active { color: var(--accent-hi); background: rgba(94,106,210,0.12); }
.ftb::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
  background: var(--surface-3); border: 1px solid var(--border-hi); color: var(--text-1);
  font-size: 10px; padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.1s; z-index: 200;
}
.ftb:hover::after { opacity: 1; }
.ftb-sep { width: 1px; height: 14px; background: var(--border); margin: 0 2px; flex-shrink: 0; }
.ftb-spacer { flex: 1; }

/* ── Frame hidden/locked states ── */
.present-frame.frame-hidden { opacity: 0.25; }
.present-frame.frame-hidden::after {
  content: 'HIDDEN'; position: absolute; top: 8px; right: 8px;
  font-size: 9px; background: var(--surface-3); color: var(--text-2);
  padding: 2px 6px; border-radius: 3px; letter-spacing: 0.1em;
}
.present-frame.frame-locked::before {
  content: '🔒'; position: absolute; top: 8px; right: 8px;
  font-size: 12px; z-index: 10;
}
.present-frame.frame-locked.frame-hidden::before { right: 68px; }

/* ── Layout picker dropdown ── */
.layout-picker {
  position: absolute; top: calc(100% + 4px); left: 0;
  background: var(--surface-1); border: 1px solid var(--border); border-radius: 8px;
  padding: 4px; display: none; flex-direction: column; gap: 2px;
  z-index: 100; min-width: 130px; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.layout-picker.open { display: flex; }
.layout-opt {
  padding: 5px 10px; font-size: 11px; color: var(--text-2); border-radius: 4px; cursor: pointer;
}
.layout-opt:hover { background: var(--surface-2); color: var(--text-1); }
.layout-opt.current { color: var(--accent-hi); background: var(--surface-3); }

/* ── Between-frame controls ── */
.between-frames {
  display: flex; align-items: center; justify-content: center;
  padding: 6px 0; position: relative; width: 100%;
  opacity: 0; transition: opacity 0.2s;
}
.between-frames:hover { opacity: 1; }
.frame-wrapper:hover + .between-frames,
.between-frames:hover { opacity: 1; }
.between-pill {
  display: flex; gap: 2px;
  background: var(--surface-1); border: 1px solid var(--border-hi); border-radius: 20px;
  padding: 3px 6px;
}
.bp-btn {
  background: none; border: none; color: var(--text-3); font-size: 11px;
  padding: 3px 10px; border-radius: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 4px;
}
.bp-btn:hover { background: var(--surface-2); color: var(--text-1); }

/* Layout types */
.layout-hero {
  padding: 72px 64px; display: flex; flex-direction: column; gap: 20px; min-height: 400px;
  align-items: flex-start; justify-content: center;
}
.layout-two-col {
  display: grid; grid-template-columns: 1fr 1fr; min-height: 360px;
}
.layout-two-col .col-left, .layout-two-col .col-right {
  padding: 48px 40px; display: flex; flex-direction: column; gap: 16px;
}
.layout-cards {
  padding: 48px 48px; display: flex; flex-direction: column; gap: 24px; min-height: 360px;
}
.layout-text {
  padding: 56px 64px; display: flex; flex-direction: column; gap: 20px;
}
.layout-image-full { min-height: 400px; display: flex; align-items: center; justify-content: center; }
.layout-raw { min-height: 360px; }

/* Default element styles */
.present-frame h1 { font-size: 3rem; font-weight: 700; line-height: 1.15; letter-spacing: -0.03em; }
.present-frame h2 { font-size: 2rem; font-weight: 600; line-height: 1.25; }
.present-frame p  { font-size: 1.1rem; line-height: 1.7; opacity: 0.8; }
.present-frame ul { padding-left: 1.5em; display: flex; flex-direction: column; gap: 8px; }
.present-frame li { font-size: 1rem; line-height: 1.6; opacity: 0.85; }
.present-button {
  display: inline-block; padding: 12px 28px; border-radius: 6px; font-weight: 600;
  font-size: 0.95rem; text-decoration: none; background: var(--accent); color: white;
  transition: opacity 0.2s;
}

/* Element selection highlight */
[data-element-id] { cursor: pointer; border-radius: 3px; transition: outline 0.1s; }
[data-element-id]:hover { outline: 1px dashed rgba(99,102,241,0.5); outline-offset: 4px; }
[data-element-id].el-selected { outline: 2px solid var(--accent); outline-offset: 4px; }

/* ── Status bar ── */
#statusbar {
  height: 28px; background: var(--surface-1); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 12px;
  font-size: 10px; color: var(--text-3); flex-shrink: 0;
}
#status-selection { color: var(--accent); }

/* ── Inspector panel ── */
#inspector {
  width: 0; min-width: 0; overflow: hidden;
  background: var(--surface-1); border-left: 1px solid var(--border);
  flex-shrink: 0; display: flex; flex-direction: column;
  transition: width 0.2s, min-width 0.2s;
}
#inspector.open { width: 216px; min-width: 216px; }

.insp-section { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
.insp-title {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: var(--text-4); margin-bottom: 10px;
}
.insp-field { margin-bottom: 8px; }
.insp-field label { font-size: 10px; color: var(--text-3); display: block; margin-bottom: 3px; }
.insp-field input, .insp-field select {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 8px; font-size: 11px; color: var(--text-2); width: 100%; height: 26px;
  outline: none; font-family: inherit;
}
.insp-field input:focus, .insp-field select:focus { border-color: var(--accent); }
.insp-hint {
  margin: 10px 14px; font-size: 10px; color: var(--text-4); line-height: 1.5;
}
.insp-hint span { color: var(--accent); }

.anim-section { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); }
.anim-dir { font-size: 9px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-bottom: 8px; }
.anim-row { display: flex; gap: 6px; margin-bottom: 6px; }
.anim-row .insp-field { flex: 1; margin-bottom: 0; }

/* ── Theme variants ── */
.theme-dark .present-frame { background: #0f172a; color: #e2e8f0; }
.theme-light .present-frame { background: #ffffff; color: #0f172a; }

/* ── Frame mode ── */
#canvas.frame-mode {
  padding: 24px;
  justify-content: center;
  align-items: center;
  overflow-y: hidden;
}
#canvas.frame-mode .present-root {
  width: 100%; max-width: 900px;
  align-items: stretch;
}
#canvas.frame-mode .frame-wrapper:not(.frame-active-mode) { display: none; }
#canvas.frame-mode .between-frames { display: none; }
#canvas.frame-mode .frame-active-mode { width: 100%; }
#canvas.frame-mode .frame-active-mode .present-frame { min-height: 72vh; }

#frame-mode-nav {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  background: rgba(13,14,18,0.92); backdrop-filter: blur(8px);
  border: 1px solid var(--border-hi); border-radius: 24px; padding: 8px 16px;
  display: none; align-items: center; gap: 12px; z-index: 200;
}
#frame-mode-nav.visible { display: flex; }
#frame-mode-nav button {
  background: none; border: none; color: var(--text-2); cursor: pointer; padding: 4px 8px;
  display: inline-flex; align-items: center;
}
#frame-mode-nav button:hover { color: var(--text-1); }
#frame-mode-nav .nav-label { font-size: 11px; color: var(--text-3); min-width: 60px; text-align: center; }

/* ── Segmented control ── */
.canvas-mode-toggle {
  display: flex;
  background: var(--surface-2);
  border-radius: 7px; padding: 3px; gap: 0;
}
.cmt-opt {
  padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--text-3);
  cursor: pointer; border: none; background: transparent; border-radius: 5px;
  transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; height: 28px;
}
.cmt-opt:hover:not(.active) { color: var(--text-2); }
.cmt-opt.active {
  background: var(--surface-3);
  color: var(--text-1);
  font-weight: 600;
}
</style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span class="title" id="pres-title">Loading...</span>
  <select id="theme-picker" onchange="setTheme(this.value)" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer;">
    <option value="dark">Dark</option>
    <option value="light">Light</option>
  </select>
  <div class="canvas-mode-toggle">
    <button class="cmt-opt active" id="mode-scroll" onclick="setCanvasMode('scroll')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
      Scroll
    </button>
    <button class="cmt-opt" id="mode-frame" onclick="setCanvasMode('frame')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Frame
    </button>
  </div>
  <button class="primary" onclick="openPreview()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16"/></svg>
    Preview
  </button>
  <button onclick="exportHTML()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export
  </button>
</div>

<!-- Body -->
<div id="body">

  <!-- Floating frame panel -->
  <div id="frame-panel">
    <div id="frame-panel-header">
      <div class="fp-view-toggle">
        <button class="fp-view-btn active" id="fp-thumb-btn" onclick="setFrameView('thumb')" title="Thumbnails">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="fp-view-btn" id="fp-list-btn" onclick="setFrameView('list')" title="List">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
      </div>
      <span id="frame-panel-toggle" onclick="togglePanel()" title="collapse">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </span>
    </div>
    <div id="frame-list"></div>
  </div>

  <!-- Scroll canvas -->
  <div id="canvas"></div>

  <!-- Right inspector -->
  <div id="inspector">
    <div id="inspector-content"></div>
  </div>
</div>

<!-- Status bar -->
<div id="statusbar">
  <span id="status-conn">Connecting...</span>
  <span>|</span>
  <span id="status-selection">No element selected</span>
</div>

<div id="frame-mode-nav">
  <button onclick="prevFrame()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="nav-label" id="frame-nav-label">1 / 1</span>
  <button onclick="nextFrame()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<!-- Inline renderer -->
<script>
/* ======================================================
   RENDERER (inlined from renderer.js)
   ====================================================== */
(function (root) {
  'use strict';

  function camelToKebab(str) {
    return str
      .replace(/^(webkit|moz|ms|o)([A-Z])/, (_, prefix, first) =>
        '-' + prefix + '-' + first.toLowerCase()
      )
      .replace(/([A-Z])/g, (m) => '-' + m.toLowerCase());
  }
  function styleObjectToCSS(obj) {
    if (!obj) return '';
    return Object.entries(obj).map(([k, v]) => `${camelToKebab(k)}: ${v}`).join('; ');
  }
  function renderElement(el) {
    const style = styleObjectToCSS(el.style);
    const anim = el.animation || {};
    const animIn = anim.in || {};
    const animOut = anim.out || {};
    const baseAttrs = [
      `id="${el.id}"`,
      `data-element-id="${el.id}"`,
      `data-element-type="${el.type}"`,
      animIn.effect    ? `data-anim-in="${animIn.effect}"` : '',
      animIn.duration  != null ? `data-anim-in-duration="${animIn.duration}"` : '',
      animIn.delay     != null ? `data-anim-in-delay="${animIn.delay}"` : '',
      animOut.effect   ? `data-anim-out="${animOut.effect}"` : '',
      animOut.duration != null ? `data-anim-out-duration="${animOut.duration}"` : '',
      style            ? `style="${style}"` : '',
    ].filter(Boolean).join(' ');
    const content = el.content || '';
    switch (el.type) {
      case 'heading':    return `<h1 ${baseAttrs}>${content}</h1>`;
      case 'subheading': return `<h2 ${baseAttrs}>${content}</h2>`;
      case 'body':       return `<p ${baseAttrs}>${content}</p>`;
      case 'image':      return `<img ${baseAttrs} src="${el.src||''}" alt="${el.alt||''}" />`;
      case 'button':     return `<a ${baseAttrs} href="${el.href||'#'}" class="present-button">${content}</a>`;
      case 'list': {
        const items = (el.items||[]).map(i => `<li>${i}</li>`).join('');
        return `<ul ${baseAttrs}>${items}</ul>`;
      }
      case 'divider':    return `<hr ${baseAttrs} />`;
      default:           return `<div ${baseAttrs}>${content}</div>`;
    }
  }
  function renderRawLayout(frame) {
    const d = document.createElement('div'); d.className = 'layout-raw';
    d.innerHTML = frame.rawHTML || ''; return d;
  }
  function makeLayout(cls) {
    return (frame) => {
      const d = document.createElement('div'); d.className = cls;
      d.innerHTML = (frame.elements||[]).map(renderElement).join(''); return d;
    };
  }
  function renderTwoColLayout(frame) {
    const elements = frame.elements || [];
    const mid = Math.ceil(elements.length / 2);
    const d = document.createElement('div'); d.className = 'layout-two-col';
    d.innerHTML = `<div class="col-left">${elements.slice(0,mid).map(renderElement).join('')}</div><div class="col-right">${elements.slice(mid).map(renderElement).join('')}</div>`;
    return d;
  }
  const LAYOUTS = {
    hero: makeLayout('layout-hero'), 'two-col': renderTwoColLayout,
    cards: makeLayout('layout-cards'), text: makeLayout('layout-text'),
    'image-full': makeLayout('layout-image-full'), raw: renderRawLayout,
  };
  function renderFrame(frame, index) {
    const w = document.createElement('div');
    w.className = 'present-frame'; w.id = frame.id;
    w.dataset.frameIndex = String(index); w.dataset.layout = frame.layout;
    if (frame.background) {
      const bg = frame.background;
      if (bg.type === 'color' || bg.type === 'gradient') w.style.background = bg.value;
      else if (bg.type === 'image') { w.style.backgroundImage=`url(${bg.value})`; w.style.backgroundSize='cover'; w.style.backgroundPosition='center'; }
    }
    const renderer = LAYOUTS[frame.layout];
    if (!renderer) console.warn(`[PresentRenderer] Unknown layout "${frame.layout}" on frame "${frame.id}", falling back to raw`);
    w.appendChild((renderer || renderRawLayout)(frame));
    return w;
  }
  function renderPresentation(json) {
    const { meta={}, frames=[] } = json;
    const c = document.createElement('div');
    c.className = `present-root theme-${meta.theme||'dark'}`;
    c.dataset.navigation = meta.navigation||'slides';
    frames.forEach((f,i) => c.appendChild(renderFrame(f,i)));
    return c;
  }

  // Animation
  const PRESETS = {
    fade:       { from:{opacity:0},            to:{opacity:1} },
    'fly-up':   { from:{opacity:0,y:40},       to:{opacity:1,y:0} },
    'fly-down': { from:{opacity:0,y:-40},      to:{opacity:1,y:0} },
    'fly-left': { from:{opacity:0,x:60},       to:{opacity:1,x:0} },
    'fly-right':{ from:{opacity:0,x:-60},      to:{opacity:1,x:0} },
    'scale-in': { from:{opacity:0,scale:0.85}, to:{opacity:1,scale:1} },
    'blur-in':  { from:{opacity:0,filter:'blur(12px)'}, to:{opacity:1,filter:'blur(0px)'} },
    wipe:       { from:{clipPath:'inset(0 100% 0 0)'}, to:{clipPath:'inset(0 0% 0 0)'} },
  };
  function initAnimations(container, mode) {
    function playIn(frameEl) {
      frameEl.querySelectorAll('[data-anim-in]').forEach(el => {
        const preset = PRESETS[el.dataset.animIn]; if (!preset || !root.gsap) return;
        root.gsap.fromTo(el, preset.from, {
          ...preset.to, duration: parseFloat(el.dataset.animInDuration)||0.6,
          delay: parseFloat(el.dataset.animInDelay)||0, ease:'power2.out'
        });
      });
    }
    function playOut(frameIndex) {
      var frameEl = container.querySelectorAll('.present-frame')[frameIndex];
      if (!frameEl) return;
      frameEl.querySelectorAll('[data-anim-out]').forEach(function(el) {
        const preset = PRESETS[el.dataset.animOut]; if (!preset || !root.gsap) return;
        root.gsap.fromTo(el, preset.to, {
          ...preset.from, duration: parseFloat(el.dataset.animOutDuration)||0.3, ease:'power2.in'
        });
      });
    }
    if (mode === 'scroll' && typeof IntersectionObserver !== 'undefined') {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { playIn(e.target); obs.unobserve(e.target); }});
      }, { threshold: 0.2 });
      container.querySelectorAll('.present-frame').forEach(f => obs.observe(f));
    }
    return {
      playFrame: (i) => { const f=container.querySelectorAll('.present-frame')[i]; if(f) playIn(f); },
      playOut
    };
  }

  root.PresentRenderer = { renderPresentation, renderFrame, renderElement, initAnimations };
})(window);
</script>

<!-- Editor logic -->
<script>
let currentJSON = null;
let selectedFrameId = null;
let selectedElementId = null;
let panelCollapsed = false;
let pendingWrites = 0;

// ── Frame toolbar ────────────────────────────────────────────────────────────

const FRAME_LAYOUTS = ['hero', 'two-col', 'cards', 'text', 'image-full', 'raw'];

function buildBetweenControls(afterFrameId) {
  const div = document.createElement('div');
  div.className = 'between-frames';

  const pill = document.createElement('div');
  pill.className = 'between-pill';

  const addBtn = document.createElement('button');
  addBtn.className = 'bp-btn';
  addBtn.textContent = '+ Add';
  addBtn.onclick = (e) => { e.stopPropagation(); addBlankFrame(afterFrameId); };
  pill.appendChild(addBtn);

  const dupBtn = document.createElement('button');
  dupBtn.className = 'bp-btn';
  dupBtn.textContent = '\u2398 Duplicate';
  dupBtn.onclick = (e) => { e.stopPropagation(); duplicateFrame(afterFrameId); };
  pill.appendChild(dupBtn);

  div.appendChild(pill);
  return div;
}

function addBlankFrame(afterFrameId) {
  if (!currentJSON) return;
  const json = JSON.parse(JSON.stringify(currentJSON));
  const idx = json.frames.findIndex(f => f.id === afterFrameId);
  const insertAt = idx === -1 ? json.frames.length : idx + 1;
  const now = Date.now();
  const blank = {
    id: 'frame-' + now,
    layout: 'text',
    background: { type: 'color', value: '#0f172a' },
    elements: [
      { id: 'el-' + now, type: 'heading', content: 'New Frame', style: { color: '#e2e8f0' } }
    ]
  };
  json.frames.splice(insertAt, 0, blank);
  writeJSON(json);
}

function buildFrameToolbar(frameId, frameData) {
  const tb = document.createElement('div');
  tb.className = 'frame-toolbar';

  // Hide button
  const hideBtn = document.createElement('button');
  hideBtn.className = 'ftb' + (frameData.hidden ? ' active' : '');
  hideBtn.textContent = frameData.hidden ? '\u{1F441} Show' : '\u25cc Hide';
  hideBtn.onclick = (e) => { e.stopPropagation(); toggleFrameHidden(frameId); };
  tb.appendChild(hideBtn);

  // Lock button
  const isLocked = frameData.locked?.content || frameData.locked?.layout;
  const lockBtn = document.createElement('button');
  lockBtn.className = 'ftb' + (isLocked ? ' active' : '');
  lockBtn.textContent = isLocked ? '\uD83D\uDD12 Locked' : '\uD83D\uDD13 Lock';
  lockBtn.onclick = (e) => { e.stopPropagation(); toggleFrameLock(frameId); };
  tb.appendChild(lockBtn);

  // Change layout dropdown
  const layoutWrapper = document.createElement('div');
  layoutWrapper.style.position = 'relative';

  const layoutBtn = document.createElement('button');
  layoutBtn.className = 'ftb';
  layoutBtn.textContent = '\u229E ' + (frameData.layout || 'raw');
  layoutBtn.onclick = (e) => {
    e.stopPropagation();
    const picker = layoutWrapper.querySelector('.layout-picker');
    picker.classList.toggle('open');
  };
  layoutWrapper.appendChild(layoutBtn);

  const picker = document.createElement('div');
  picker.className = 'layout-picker';
  FRAME_LAYOUTS.forEach(l => {
    const opt = document.createElement('div');
    opt.className = 'layout-opt' + (l === frameData.layout ? ' current' : '');
    opt.textContent = l;
    opt.onclick = (e) => {
      e.stopPropagation();
      picker.classList.remove('open');
      if (l !== frameData.layout) changeFrameLayout(frameId, l);
    };
    picker.appendChild(opt);
  });
  layoutWrapper.appendChild(picker);
  tb.appendChild(layoutWrapper);

  // Close picker on outside click (once: true so it self-removes after firing)
  document.addEventListener('click', () => picker.classList.remove('open'), { once: true });

  const spacer = document.createElement('span');
  spacer.className = 'ftb-spacer';
  tb.appendChild(spacer);

  // Duplicate
  const dupBtn = document.createElement('button');
  dupBtn.className = 'ftb';
  dupBtn.textContent = '\u2398 Duplicate';
  dupBtn.onclick = (e) => { e.stopPropagation(); duplicateFrame(frameId); };
  tb.appendChild(dupBtn);

  // Delete
  const delBtn = document.createElement('button');
  delBtn.className = 'ftb danger';
  delBtn.textContent = '\u2715 Delete';
  delBtn.onclick = (e) => { e.stopPropagation(); deleteFrame(frameId); };
  tb.appendChild(delBtn);

  return tb;
}

function toggleFrameHidden(frameId) {
  const frame = getFrame(frameId);
  if (!frame) return;
  updateFrame(frameId, { hidden: !frame.hidden });
}

function toggleFrameLock(frameId) {
  const frame = getFrame(frameId);
  if (!frame) return;
  const isLocked = frame.locked?.content || frame.locked?.layout;
  updateFrame(frameId, { locked: isLocked ? null : { content: true, layout: true } });
}

function changeFrameLayout(frameId, layout) {
  updateFrame(frameId, { layout });
}

function duplicateFrame(frameId) {
  if (!currentJSON) return;
  const json = JSON.parse(JSON.stringify(currentJSON));
  const idx = json.frames.findIndex(f => f.id === frameId);
  if (idx === -1) return;
  const copy = JSON.parse(JSON.stringify(json.frames[idx]));
  copy.id = 'frame-' + Date.now();
  json.frames.splice(idx + 1, 0, copy);
  writeJSON(json);
}

function deleteFrame(frameId) {
  if (!currentJSON || currentJSON.frames.length <= 1) return;
  const json = JSON.parse(JSON.stringify(currentJSON));
  json.frames = json.frames.filter(f => f.id !== frameId);
  writeJSON(json);
  if (selectedFrameId === frameId) { selectedFrameId = null; selectedElementId = null; }
}

// ── Fetch + render ──────────────────────────────────────────────────────────

async function loadAndRender() {
  const res = await fetch('/presentation.json');
  currentJSON = await res.json();
  renderEditor(currentJSON);
}

function renderEditor(json) {
  const { meta = {}, frames = [] } = json;
  document.title = meta.title || 'Present';
  document.getElementById('pres-title').textContent = meta.title || 'Untitled';

  // Canvas
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  const root = PresentRenderer.renderPresentation(json);

  // Wrap each frame in a .frame-wrapper and inject toolbar
  const frameEls = Array.from(root.querySelectorAll('.present-frame'));
  frameEls.forEach((frameEl) => {
    const frameId = frameEl.id;
    const frameData = json.frames.find(f => f.id === frameId);
    if (!frameData) return;

    // Apply hidden/locked visual states
    if (frameData.hidden) frameEl.classList.add('frame-hidden');
    if (frameData.locked) frameEl.classList.add('frame-locked');

    const wrapper = document.createElement('div');
    wrapper.className = 'frame-wrapper';

    const toolbar = buildFrameToolbar(frameId, frameData);
    wrapper.appendChild(toolbar);
    frameEl.parentNode.insertBefore(wrapper, frameEl);
    wrapper.appendChild(frameEl);
  });

  // Inject between-frame controls after each wrapper
  Array.from(root.querySelectorAll('.frame-wrapper')).forEach((wrapper) => {
    const frameId = wrapper.querySelector('.present-frame')?.id;
    if (!frameId) return;
    wrapper.insertAdjacentElement('afterend', buildBetweenControls(frameId));
  });

  // Wire element click -> selection
  root.querySelectorAll('[data-element-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      selectElement(el.closest('.present-frame').id, el.dataset.elementId);
    });
  });

  // Wire frame click (deselect element)
  root.querySelectorAll('.present-frame').forEach(f => {
    f.addEventListener('click', () => selectFrame(f.id));
  });

  canvas.appendChild(root);

  // Init animations (scroll mode by default in editor)
  PresentRenderer.initAnimations(root, 'scroll');

  // Frame strip
  renderFrameStrip(frames);

  // Restore selection highlight
  if (selectedFrameId) highlightFrame(selectedFrameId);
  if (selectedElementId) {
    highlightElement(selectedElementId);
    openInspector(selectedElementId);
  }

  syncThemePicker();
  applyCanvasMode();
}

// ── Selection ───────────────────────────────────────────────────────────────

function selectFrame(frameId) {
  selectedFrameId = frameId;
  selectedElementId = null;
  highlightFrame(frameId);
  clearElementHighlight();
  updateStatus();
  postSelection({ frameId });
  closeInspector();
}

function selectElement(frameId, elementId) {
  selectedFrameId = frameId;
  selectedElementId = elementId;
  highlightFrame(frameId);
  highlightElement(elementId);
  updateStatus();
  postSelection({ frameId, elementId });
  openInspector(elementId);
}

function highlightFrame(frameId) {
  document.querySelectorAll('.present-frame').forEach(f => f.classList.remove('frame-selected'));
  document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
  const f = document.getElementById(frameId);
  if (f) f.classList.add('frame-selected');
  document.querySelectorAll('.frame-thumb').forEach(t => {
    if (t.dataset.frameId === frameId) t.classList.add('active');
  });
}

function highlightElement(elementId) {
  document.querySelectorAll('[data-element-id]').forEach(el => el.classList.remove('el-selected'));
  const el = document.querySelector(`[data-element-id="${elementId}"]`);
  if (el) el.classList.add('el-selected');
}

function clearElementHighlight() {
  document.querySelectorAll('[data-element-id]').forEach(el => el.classList.remove('el-selected'));
}

function updateStatus() {
  const sel = document.getElementById('status-selection');
  if (selectedElementId) {
    const el = currentJSON?.frames
      .flatMap(f => f.elements || [])
      .find(e => e.id === selectedElementId);
    sel.textContent = `Selected: ${el?.type || 'element'} #${selectedElementId} in ${selectedFrameId}`;
  } else if (selectedFrameId) {
    sel.textContent = `Frame selected: ${selectedFrameId}`;
  } else {
    sel.textContent = 'No element selected';
  }
}

async function postSelection(data) {
  try {
    await fetch('/selection', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
  } catch (e) { /* server may not be running */ }
}

// ── Frame strip ─────────────────────────────────────────────────────────────

let frameViewMode = 'thumb'; // 'thumb' | 'list'

function setFrameView(mode) {
  frameViewMode = mode;
  document.getElementById('fp-thumb-btn').classList.toggle('active', mode === 'thumb');
  document.getElementById('fp-list-btn').classList.toggle('active', mode === 'list');
  const list = document.getElementById('frame-list');
  list.classList.toggle('list-view', mode === 'list');
  if (currentJSON) renderFrameStrip(currentJSON.frames);
}

function getFrameTitle(frame) {
  const heading = (frame.elements || []).find(e => e.type === 'heading' || e.type === 'subheading');
  if (heading?.content) return heading.content.slice(0, 18);
  return frame.layout || 'frame';
}

function renderFrameStrip(frames) {
  const list = document.getElementById('frame-list');
  list.innerHTML = '';
  list.classList.toggle('list-view', frameViewMode === 'list');

  frames.forEach((frame, i) => {
    const thumb = document.createElement('div');
    thumb.className = 'frame-thumb';
    thumb.dataset.frameId = frame.id;

    if (frameViewMode === 'thumb') {
      if (frame.background) {
        const bg = frame.background;
        if (bg.type === 'color' || bg.type === 'gradient') thumb.style.background = bg.value;
      }
      const num = document.createElement('span');
      num.className = 'frame-thumb-num';
      num.textContent = i + 1;
      thumb.appendChild(num);
    } else {
      // List view
      const num = document.createElement('span');
      num.className = 'frame-thumb-num';
      num.textContent = i + 1;
      const label = document.createElement('span');
      label.className = 'frame-thumb-label';
      label.textContent = getFrameTitle(frame);
      thumb.appendChild(num);
      thumb.appendChild(label);
    }

    thumb.addEventListener('click', () => {
      if (canvasMode === 'frame') {
        showFrameAtIndex(i);
      } else {
        const frameEl = document.getElementById(frame.id);
        if (frameEl) frameEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        selectFrame(frame.id);
      }
    });

    list.appendChild(thumb);
  });
}

function togglePanel() {
  const panel = document.getElementById('frame-panel');
  panelCollapsed = !panelCollapsed;
  panel.style.display = panelCollapsed ? 'none' : 'flex';
}

// ── SSE hot-reload ───────────────────────────────────────────────────────────

function connectSSE() {
  const es = new EventSource('/events');
  es.onopen = () => {
    document.getElementById('status-conn').textContent = '\u25cf Live';
    document.getElementById('status-conn').style.color = '#22c55e';
  };
  es.onmessage = (e) => {
    if (e.data === 'reload') {
      if (pendingWrites > 0) { pendingWrites--; return; }
      loadAndRender();
    }
  };
  es.onerror = () => {
    document.getElementById('status-conn').textContent = '\u25cb Disconnected';
    document.getElementById('status-conn').style.color = '#ef4444';
    es.close();
    setTimeout(connectSSE, 3000);
  };
}

// ── Preview ───────────────────────────────────────────────────────────────────

async function openPreview() {
  if (!currentJSON) return;
  const html = buildPreviewHTML(currentJSON);
  try {
    await fetch('/preview', {
      method: 'POST',
      headers: { 'Content-Type': 'text/html' },
      body: html,
    });
    window.open('/preview', '_blank');
  } catch (e) {
    // Fallback to blob if server unreachable
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    setTimeout(() => URL.revokeObjectURL(url), 100);
  }
}

    '<div id="root"><\/div>\n' +
    backBtnHTML +
    (isSlides ? slidesNavHTML : '') +
    '<script>\n' +
    rendererScript + '\n' +
    'var __json = ' + JSON.stringify(json) + ';\n' +
    'document.addEventListener("DOMContentLoaded", function() {\n' +
    '  var container = PresentRenderer.renderPresentation(__json);\n' +
    '  document.getElementById("root").appendChild(container);\n' +
    (isSlides ? slidesJS : '  PresentRenderer.initAnimations(container, "scroll");\n') +
    '});\n' +
    '<\/script>\n' +
    '<\/body>\n' +
    '<\/html>';
}

// ── JSON write-back ─────────────────────────────────────────────────────────

async function writeJSON(json) {
  pendingWrites++;
  currentJSON = json;
  try {
    await fetch('/json', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(json, null, 2),
    });
    pendingWrites--;
  } catch (e) { pendingWrites--; /* server may not be running */ }
  renderEditor(json);
}

function getFrame(frameId) {
  return currentJSON.frames.find(f => f.id === frameId);
}

function updateFrame(frameId, patch) {
  const json = JSON.parse(JSON.stringify(currentJSON)); // deep clone
  const frame = json.frames.find(f => f.id === frameId);
  if (!frame) return;
  Object.assign(frame, patch);
  writeJSON(json);
}

// ── Inspector panel ─────────────────────────────────────────────────────────

const ANIM_EFFECTS = ['', 'fade', 'fly-up', 'fly-down', 'fly-left', 'fly-right', 'scale-in', 'blur-in', 'wipe'];

function openInspector(elementId) {
  document.getElementById('inspector').classList.add('open');
  renderInspector(elementId);
}

function closeInspector() {
  document.getElementById('inspector').classList.remove('open');
  document.getElementById('inspector-content').innerHTML = '';
}

function renderInspector(elementId) {
  if (!elementId || !currentJSON) return;
  const el = currentJSON.frames.flatMap(f => f.elements || []).find(e => e.id === elementId);
  if (!el) return;

  const content = document.getElementById('inspector-content');
  content.innerHTML = '';

  // Element properties section
  const propSection = document.createElement('div');
  propSection.className = 'insp-section';
  propSection.innerHTML = '<div class="insp-title">Element \u2014 ' + el.type + '</div>';

  propSection.appendChild(makeField('Font size', 'text', el.style?.fontSize || '', (v) => {
    updateElementStyle(elementId, 'fontSize', v || undefined);
  }));

  propSection.appendChild(makeColorField('Color', el.style?.color || '#ffffff', (v) => {
    updateElementStyle(elementId, 'color', v);
  }));

  const weightOpts = [['', 'Default'], ['400', 'Normal'], ['600', 'Semibold'], ['700', 'Bold']];
  propSection.appendChild(makeSelectField('Weight', weightOpts, String(el.style?.fontWeight || ''), (v) => {
    updateElementStyle(elementId, 'fontWeight', v ? Number(v) : undefined);
  }));

  content.appendChild(propSection);

  // Animation section
  const animIn = el.animation?.in || {};
  const animOut = el.animation?.out || {};
  const animSection = document.createElement('div');
  animSection.className = 'anim-section';
  animSection.innerHTML = '<div class="insp-title">Animation</div><div class="anim-dir">\u2197 In</div>';

  animSection.appendChild(makeAnimEffectField(animIn.effect || '', (v) => updateAnimIn(elementId, 'effect', v || undefined)));
  const inRow = document.createElement('div'); inRow.className = 'anim-row';
  inRow.appendChild(wrapField('Duration', makeNumInput(animIn.duration ?? '', (v) => updateAnimIn(elementId, 'duration', v))));
  inRow.appendChild(wrapField('Delay', makeNumInput(animIn.delay ?? '', (v) => updateAnimIn(elementId, 'delay', v))));
  animSection.appendChild(inRow);

  const outDir = document.createElement('div');
  outDir.className = 'anim-dir'; outDir.style.marginTop = '10px';
  outDir.textContent = '\u2199 Out';
  animSection.appendChild(outDir);
  animSection.appendChild(makeAnimEffectField(animOut.effect || '', (v) => updateAnimOut(elementId, 'effect', v || undefined)));
  const outRow = document.createElement('div'); outRow.className = 'anim-row';
  outRow.appendChild(wrapField('Duration', makeNumInput(animOut.duration ?? '', (v) => updateAnimOut(elementId, 'duration', v))));
  outRow.appendChild(wrapField('Delay', makeNumInput(animOut.delay ?? '', (v) => updateAnimOut(elementId, 'delay', v))));
  animSection.appendChild(outRow);

  content.appendChild(animSection);

  // Hint
  const hint = document.createElement('div');
  hint.className = 'insp-hint';
  hint.innerHTML = '<span>Tip:</span> Ask Claude in chat for complex changes \u2014 gradient text, custom animations, layout restructure.';
  content.appendChild(hint);
}

// Field builders
function makeField(label, type, value, onChange) {
  const f = document.createElement('div'); f.className = 'insp-field';
  const lbl = document.createElement('label'); lbl.textContent = label;
  const inp = document.createElement('input'); inp.type = type; inp.value = value;
  inp.addEventListener('change', () => onChange(inp.value));
  f.appendChild(lbl); f.appendChild(inp);
  return f;
}

function makeColorField(label, value, onChange) {
  const f = document.createElement('div'); f.className = 'insp-field';
  const lbl = document.createElement('label'); lbl.textContent = label;
  const row = document.createElement('div'); row.style.cssText = 'display:flex;gap:6px;align-items:center;';
  const swatch = document.createElement('input'); swatch.type = 'color';
  if (/^#[0-9a-f]{3,6}$/i.test(value)) swatch.value = value;
  swatch.style.cssText = 'width:28px;height:28px;border:none;border-radius:4px;cursor:pointer;padding:0;background:none;';
  const text = document.createElement('input'); text.type = 'text'; text.value = value; text.style.flex = '1';
  swatch.addEventListener('input', () => { text.value = swatch.value; onChange(swatch.value); });
  text.addEventListener('change', () => {
    if (/^#[0-9a-f]{3,6}$/i.test(text.value)) swatch.value = text.value;
    onChange(text.value);
  });
  row.appendChild(swatch); row.appendChild(text);
  f.appendChild(lbl); f.appendChild(row);
  return f;
}

function makeSelectField(label, options, value, onChange) {
  const f = document.createElement('div'); f.className = 'insp-field';
  const lbl = document.createElement('label'); lbl.textContent = label;
  const sel = document.createElement('select');
  options.forEach(([v, t]) => {
    const opt = document.createElement('option'); opt.value = v; opt.textContent = t;
    if (v === value) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => onChange(sel.value));
  f.appendChild(lbl); f.appendChild(sel);
  return f;
}

function makeAnimEffectField(value, onChange) {
  const opts = ANIM_EFFECTS.map(e => [e, e || 'none']);
  return makeSelectField('Effect', opts, value, onChange);
}

function makeNumInput(value, onChange) {
  const inp = document.createElement('input');
  inp.type = 'number'; inp.min = '0'; inp.step = '0.1';
  inp.value = (value === '' || value == null) ? '' : value;
  inp.style.cssText = 'background:#141820;border:1px solid #1e2a3a;border-radius:4px;padding:5px 8px;font-size:11px;color:#cbd5e1;width:100%;outline:none;';
  inp.addEventListener('change', () => {
    const v = parseFloat(inp.value);
    onChange(isNaN(v) ? undefined : v);
  });
  return inp;
}

function wrapField(label, input) {
  const f = document.createElement('div'); f.className = 'insp-field'; f.style.flex = '1';
  const lbl = document.createElement('label'); lbl.textContent = label;
  f.appendChild(lbl); f.appendChild(input);
  return f;
}

// JSON update helpers
function updateElementStyle(elementId, prop, value) {
  if (!currentJSON) return;
  const json = JSON.parse(JSON.stringify(currentJSON));
  for (const frame of json.frames) {
    const el = (frame.elements || []).find(e => e.id === elementId);
    if (el) {
      el.style = el.style || {};
      if (value === undefined) delete el.style[prop]; else el.style[prop] = value;
      break;
    }
  }
  writeJSON(json);
}

function updateAnimIn(elementId, prop, value) {
  if (!currentJSON) return;
  const json = JSON.parse(JSON.stringify(currentJSON));
  for (const frame of json.frames) {
    const el = (frame.elements || []).find(e => e.id === elementId);
    if (el) {
      el.animation = el.animation || {};
      el.animation.in = el.animation.in || {};
      if (value === undefined) delete el.animation.in[prop]; else el.animation.in[prop] = value;
      break;
    }
  }
  writeJSON(json);
}

function updateAnimOut(elementId, prop, value) {
  if (!currentJSON) return;
  const json = JSON.parse(JSON.stringify(currentJSON));
  for (const frame of json.frames) {
    const el = (frame.elements || []).find(e => e.id === elementId);
    if (el) {
      el.animation = el.animation || {};
      el.animation.out = el.animation.out || {};
      if (value === undefined) delete el.animation.out[prop]; else el.animation.out[prop] = value;
      break;
    }
  }
  writeJSON(json);
}

// ── Theme picker ─────────────────────────────────────────────────────────────

function setTheme(theme) {
  if (!currentJSON) return;
  const json = JSON.parse(JSON.stringify(currentJSON));
  json.meta = json.meta || {};
  json.meta.theme = theme;
  writeJSON(json);
}

function syncThemePicker() {
  const picker = document.getElementById('theme-picker');
  if (picker && currentJSON?.meta?.theme) picker.value = currentJSON.meta.theme;
}

// ── Export to single HTML ────────────────────────────────────────────────────

function exportHTML() {
  if (!currentJSON) return;
  const exportJSON = JSON.parse(JSON.stringify(currentJSON));
  exportJSON.frames = exportJSON.frames.filter(f => !f.hidden);
  const html = buildPreviewHTML(exportJSON);
  const slug = (currentJSON.meta?.title || 'presentation')
    .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  const blob = new Blob([html], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = slug + '.html';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 100);
}

// ── Canvas mode ──────────────────────────────────────────────────────────────

let canvasMode = localStorage.getItem('presentCanvasMode') || 'scroll';
let frameModeIndex = 0;

function setCanvasMode(mode) {
  canvasMode = mode;
  localStorage.setItem('presentCanvasMode', mode);
  document.getElementById('mode-scroll').classList.toggle('active', mode === 'scroll');
  document.getElementById('mode-frame').classList.toggle('active', mode === 'frame');
  applyCanvasMode();
}

function applyCanvasMode() {
  const canvas = document.getElementById('canvas');
  const nav = document.getElementById('frame-mode-nav');
  if (canvasMode === 'frame') {
    canvas.classList.add('frame-mode');
    nav.classList.add('visible');
    showFrameAtIndex(frameModeIndex);
  } else {
    canvas.classList.remove('frame-mode');
    nav.classList.remove('visible');
    canvas.querySelectorAll('.frame-wrapper').forEach(w => w.classList.remove('frame-active-mode'));
  }
}

function showFrameAtIndex(idx) {
  const wrappers = Array.from(document.querySelectorAll('.frame-wrapper'));
  const visible = wrappers.filter(w => {
    const fid = w.querySelector('.present-frame')?.id;
    const fd = currentJSON?.frames.find(f => f.id === fid);
    return fd && !fd.hidden;
  });
  if (!visible.length) return;
  frameModeIndex = Math.max(0, Math.min(idx, visible.length - 1));
  wrappers.forEach(w => w.classList.remove('frame-active-mode'));
  visible[frameModeIndex].classList.add('frame-active-mode');
  const label = document.getElementById('frame-nav-label');
  if (label) label.textContent = (frameModeIndex + 1) + ' / ' + visible.length;
  // Sync frame strip highlight
  const activeFrameId = visible[frameModeIndex].querySelector('.present-frame')?.id;
  if (activeFrameId) highlightFrame(activeFrameId);
}

function prevFrame() { showFrameAtIndex(frameModeIndex - 1); }
function nextFrame() { showFrameAtIndex(frameModeIndex + 1); }

// ── Init ─────────────────────────────────────────────────────────────────────

// Sync canvas mode toggle buttons with saved state
document.getElementById('mode-scroll').classList.toggle('active', canvasMode === 'scroll');
document.getElementById('mode-frame').classList.toggle('active', canvasMode === 'frame');
loadAndRender();
connectSSE();
</script>
